name: Update Templates Index

on:
  schedule:
    # Primer día de cada mes a las 3:00 UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Verbose output'
        type: boolean
        default: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch templates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node skills/sitio-hoy-project-director/scripts/fetch-templates.mjs \
            ${{ inputs.verbose && '--verbose' || '' }}

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add skills/sitio-hoy-project-director/data/templates/index.json
          git diff --staged --quiet || \
            git commit -m "chore: actualizar biblioteca de templates ($(date +%Y-%m-%d))"
          git push
